name: Update profile art

on:
  schedule:
    # runs once a day (07:00 UTC) -- adjust as you like
    - cron: "0 7 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scraper/renderer dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch latest contributions
        env:
          GH_PROFILE_USER: amonsadhu
        run: python scripts/fetch_contributions.py

      - name: Render contribution heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --cached --quiet || git commit -m "chore: refresh contribution graph"
          git push
